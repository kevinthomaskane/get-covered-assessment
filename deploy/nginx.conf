# Get Covered Assessment — reverse proxy to Next.js
server {
    listen 443 ssl;
    server_name get-covered-assessment.10xdev.io;

    ssl_certificate /etc/letsencrypt/live/10xdev.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/10xdev.io/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
