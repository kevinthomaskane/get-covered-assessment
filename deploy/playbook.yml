---
- name: Deploy Get Covered Assessment
  hosts: gca
  vars_files:
    - vars.yml
  vars:
    app_dir: /opt/get-covered-assessment
    repo_dir: "{{ app_dir }}/repo"
    data_dir: "{{ app_dir }}/data"
    domain: get-covered-assessment.10xdev.io
    web_port: 3002
    repo_url: "https://github.com/kevinthomaskane/get-covered-assessment.git"

  tasks:
    # --- System packages ---

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - git
          - build-essential
          - curl
          - unzip
          - ufw
          - ca-certificates
        state: present

    # --- Firewall ---

    - name: UFW default deny incoming
      ufw:
        direction: incoming
        policy: deny

    - name: UFW default allow outgoing
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH/HTTP/HTTPS
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ["22", "80", "443"]

    - name: Enable UFW
      ufw:
        state: enabled

    # --- Node.js + pnpm via corepack ---
    # Node 22 is already provisioned on this VPS by an earlier playbook.
    # If deploying to a fresh box, install Node via NodeSource (or nvm/fnm)
    # before running this playbook, or add the corresponding tasks here.

    - name: Verify Node.js is installed
      command: node --version
      register: node_version
      changed_when: false

    - name: Enable corepack and prepare pnpm
      shell: |
        corepack enable
        corepack prepare pnpm@10.25.0 --activate
      environment:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      changed_when: false

    - name: Install PM2 globally
      shell: |
        if ! command -v pm2 >/dev/null; then
          npm install -g pm2
        fi
      changed_when: false

    # --- Playwright Chromium dependencies ---

    - name: Install Chromium runtime libs
      apt:
        name:
          - libnss3
          - libatk1.0-0
          - libatk-bridge2.0-0
          - libcups2
          - libdrm2
          - libxkbcommon0
          - libxcomposite1
          - libxdamage1
          - libxrandr2
          - libgbm1
          - libpango-1.0-0
          - libcairo2
          - libasound2t64
          - libxshmfence1
          - libxfixes3
        state: present

    # --- Directories ---

    - name: Ensure app directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ data_dir }}"
        - /var/log/gca

    # --- Code ---

    - name: Clone or update repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dir }}"
        version: main
        force: yes

    - name: pnpm install
      shell: pnpm install --frozen-lockfile
      args:
        chdir: "{{ repo_dir }}"
      environment:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

    - name: Install Playwright Chromium
      shell: pnpm --filter @app/worker exec playwright install chromium
      args:
        chdir: "{{ repo_dir }}"
      environment:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

    - name: Build Next.js app
      shell: pnpm --filter @app/web build
      args:
        chdir: "{{ repo_dir }}"
      environment:
        COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

    # --- Environment ---

    - name: Write .env at repo root
      copy:
        dest: "{{ repo_dir }}/.env"
        mode: "0600"
        content: |
          ANTHROPIC_API_KEY={{ anthropic_api_key }}
          DB_PATH={{ data_dir }}/jobs.db
          NODE_ENV=production
      no_log: true

    # --- nginx ---

    - name: Deploy nginx site config
      copy:
        src: nginx.conf
        dest: /etc/nginx/sites-available/gca.conf

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/gca.conf
        dest: /etc/nginx/sites-enabled/gca.conf
        state: link
      notify: Reload nginx

    # --- PM2 ---

    - name: Deploy PM2 ecosystem config
      copy:
        src: ecosystem.config.cjs
        dest: "{{ app_dir }}/ecosystem.config.cjs"

    - name: (Re)start PM2 apps
      shell: |
        cd {{ app_dir }}
        pm2 delete gca-worker gca-web 2>/dev/null || true
        pm2 start ecosystem.config.cjs
        pm2 save
      changed_when: false

    - name: Configure PM2 to start on boot
      shell: |
        pm2 startup systemd -u root --hp /root | tail -1 | bash
        pm2 save
      changed_when: false
      ignore_errors: yes

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
